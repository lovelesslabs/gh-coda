name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Bootstrap tools
        uses: ./.github/actions/bootstrap-tools

      - name: Run tests
        shell: bash
        run: ~/.local/lib/shellspec/shellspec --no-kcov

      - name: Build
        shell: bash
        run: |
          just build

      - name: Verify build
        run: |
          ./gh-coda --version
          ./gh-coda --help

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./lib"
          severity: warning

  commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check conventional commits
        uses: cocogitto/cocogitto-action@v4
        with:
          command: check

  release:
    name: Auto Release
    needs: [test, shellcheck, commits] # only after all tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - name: GitHub Actions Bot Setup
        uses: ./.github/actions/bot-setup

      - name: Bootstrap tools
        uses: ./.github/actions/bootstrap-tools

      - name: Bump version (if releasable commits exist)
        run: |
          if cog bump --auto --dry-run 2>/dev/null; then
            echo "Releasable commits found, bumping..."
            cog bump --auto
          else
            echo "No releasable commits since last tag, skipping release"
          fi
