name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea to make gh-coda better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point
      placeholder: I often find myself manually configuring X because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
      placeholder: |
        It would be great if gh-coda could...

        Example config:
        ```yaml
        new_setting: value
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: scope
    attributes:
      label: What area does this affect?
      options:
        - Config settings (gh repo edit)
        - API settings (dependabot, etc.)
        - Branch protection / rulesets
        - Environments / Pages
        - 1Password integration
        - CLI / UX
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to submit a PR for this feature
